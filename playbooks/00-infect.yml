---
- name: Operation "Patient Zero" - Infection NixOS
  hosts: vps
  become: yes
  gather_facts: yes

  vars:
    target_channel: "nixos-25.11"

  tasks:
    - name: Vérifier si NixOS est déjà là
      ansible.builtin.stat:
        path: /etc/nixos
      register: nixos_dir

    - name: ABORT MISSION - Le serveur est déjà sous NixOS !
      ansible.builtin.fail:
        msg: "Ce serveur semble déjà tourner sous NixOS. Je ne lance pas l'infection."
      when: nixos_dir.stat.exists

    - name: Installer curl si nécessaire
      ansible.builtin.package:
        name: curl
        state: present
      when: ansible_distribution != 'NixOS'

    - name: Démonter /tmp si monté
      raw: unmount /tmp || true
      args:
        warn: false
      ignore_errors: true

    - name: Copier les clés SSH utilisateur dans /root/.ssh/authorized_keys
      ansible.builtin.copy:
        src: "/home/{{ ansible_user_id }}/.ssh/authorized_keys"
        dest: /root/.ssh/authorized_keys
        owner: root
        group: root
        mode: "0600"
      when: ansible_user_id != 'root'

    - name: Lancer nixos-infect
      ansible.builtin.shell: |
        curl https://raw.githubusercontent.com/elitak/nixos-infect/master/nixos-infect | NIX_CHANNEL={{ target_channel }} bash
      async: 600
      poll: 0
      ignore_errors: true

    - name: Attendre arrêt SSH (port 22 down)
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        state: stopped
        timeout: 120
      delegate_to: localhost

    - name: Attendre disponibilité SSH (port 22 up)
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        state: started
        delay: 30
        timeout: 600
      delegate_to: localhost

    - name: Vérifier la réussite de l'opération
      raw: grep PRETTY_NAME /etc/os-release
      register: os_check
      changed_when: false

    - name: Afficher le nouvel OS
      ansible.builtin.debug:
        msg: "Le serveur est maintenant : {{ os_check.stdout_lines | select('search', 'PRETTY_NAME') | list }}"
