---
- name: Déploiement NixOS
  hosts: vps_ovh
  # On utilise la variable ansible_user qui sera définie soit dans l'inventaire, soit en ligne de commande
  become: yes # On aura besoin de passer root (via sudo ou direct)
  gather_facts: no

  tasks:
    # 1. BOOTSTRAP : On installe Python à la dure
    # Le module 'raw' n'a besoin de RIEN sur le serveur
    - name: Bootstrap Python (via Raw SSH)
      raw: nix-env -iA nixos.python3
      register: bootstrap_python
      changed_when: "'installing' in bootstrap_python.stdout"

    - name: Définir l'interpréteur Python pour la suite
      set_fact:
        ansible_python_interpreter: /root/.nix-profile/bin/python3

    - name: Déployer la configuration
      template:
        src: configuration.nix.j2
        dest: /etc/nixos/configuration.nix
        validate: "nix-instantiate --parse %s"

    - name: Initialiser config-loader.nix (si absent)
      raw: |
        if [ ! -f /etc/nixos/loader.nix ]; then
          printf "{ ... }: {\n  imports = [];\n}\n" > /etc/nixos/loader.nix
        fi

    - name: Appliquer la configuration (Switch)
      command: nixos-rebuild switch

    - name: Désinstaller Python temporaire
      # On utilise 'raw' pour être sûr qu'Ansible ne crashe pas
      # en essayant d'utiliser le python qu'il est en train de supprimer
      raw: nix-env -e python3
      ignore_errors: yes # Au cas où il serait déjà parti via le rebuild (peu probable)


    #- name: Appliquer (Switch)
    #  command: nixos-rebuild switch
